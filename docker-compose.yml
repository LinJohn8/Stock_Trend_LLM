x-stock-ai-app: &stock-ai-app
  image: stock-trend-llm:latest
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  volumes:
    - ./data:/app/data
    - ./logs:/app/logs
    - ./reports/generated:/app/reports/generated
  restart: unless-stopped

services:
  stock-ai-dashboard:
    <<: *stock-ai-app
    container_name: stock_ai_dashboard
    ports:
      - "8501:8501"
    command: streamlit run dashboard/streamlit_app.py --server.address=0.0.0.0 --server.port=8501

  stock-ai-api:
    <<: *stock-ai-app
    container_name: stock_ai_api
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
