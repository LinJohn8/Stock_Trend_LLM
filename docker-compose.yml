x-stock-ai-app: &stock-ai-app
  image: stock-trend-llm:latest
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  volumes:
    - ./data:/app/data
    - ./logs:/app/logs
    - ./reports/generated:/app/reports/generated
  restart: unless-stopped

services:
  stock-ai-app:
    <<: *stock-ai-app
    container_name: stock_ai_app
    ports:
      - "9690-9699:9690-9699"
    command: python -m tasks.start_app --lan --no-browser
